<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelCraft - 페이지를 찾을 수 없습니다 (404)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1.2">
    <script src="js/lucide.min.js"></script>
    <style>
        .error-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        .error-card {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 3rem 2rem;
        }
        .error-icon {
            width: 64px;
            height: 64px;
            background: var(--accent-gradient);
            border-radius: var(--border-radius-md);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: var(--shadow-accent);
            margin-bottom: 2rem;
        }
        .error-card h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .redirect-notice {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4316484120133133"
            crossorigin="anonymous"></script>
</head>
<body>
    <div class="bg-decorations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="error-layout">
        <div class="card glass-card error-card">
            <div class="error-icon">
                <i data-lucide="alert-triangle" style="width: 32px; height: 32px;"></i>
            </div>
            <h1>404</h1>
            <p>요청하신 페이지를 찾을 수 없습니다. 주소가 잘못 입력되었거나, 변경 혹은 삭제되었을 수 있습니다.</p>
            <a href="./" class="btn btn-primary">
                <i data-lucide="home"></i>
                홈으로 돌아가기
            </a>
            <div class="redirect-notice" id="redirect-message">
                3초 후 메인 페이지로 자동으로 이동합니다...
            </div>
        </div>
    </div>

    <script>
        // Initialize lucide icons
        lucide.createIcons();

        // Automatic redirect to index.html after 3 seconds
        let seconds = 3;
        const msgEl = document.getElementById('redirect-message');
        const timer = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = './';
            } else {
                msgEl.textContent = seconds + '초 후 메인 페이지로 자동으로 이동합니다...';
            }
        }, 1000);
    </script>
</body>
</html>
